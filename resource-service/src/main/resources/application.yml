spring:
  application:
    name: resource-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/resource_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    loadbalancer:
      ribbon:
        enabled: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000
          multiplier: 2

server:
  port: 8080

# Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFERIPADDRESS:true}
    appname: resource-service

s3:
  endpoint: ${S3_ENDPOINT:http://localhost:4566}
  region: ${S3_REGION:us-east-1}
  access-key: ${S3_ACCESS_KEY:test}
  secret-key: ${S3_SECRET_KEY:test}
  path-style-access: ${S3_PATH_STYLE:true}

# RabbitMQ configuration
rabbitmq:
  queue:
    resource:
      upload:
        queue: resource.upload.queue
        dlq: resource.upload.dlq
      processed:
        queue: resource.processed.queue
  exchange:
    resource:
      main: resource.exchange
      dlx: resource.dlx
  routing:
    key:
      resource:
        upload: resource.upload.routing.key
        dlq: resource.upload.routing.key
        processed: resource.processed.routing.key

song:
  service:
    url: ${SONG_SERVICE_URL:http://song-service}

storage:
  service:
    url: ${STORAGE_SERVICE_URL:http://storage-service}

logging:
  level:
    root: INFO
    com:
      epam:
        learn:
          resource_service: DEBUG
    org:
      hibernate:
        SQL: OFF
        type:
          descriptor:
            sql:
              BasicBinder: OFF
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %highlight(%-5level) - %msg%n"

# Resilience4j retry configuration
resilience4j:
  retry:
    instances:
      songServiceClient:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.RestClientException
          - java.io.IOException
          - java.util.concurrent.TimeoutException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException$NotFound
          - org.springframework.web.client.HttpClientErrorException$BadRequest
      s3Upload:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - software.amazon.awssdk.core.exception.SdkClientException
          - software.amazon.awssdk.services.s3.model.S3Exception
        ignoreExceptions:
          - software.amazon.awssdk.services.s3.model.NoSuchBucketException
          - java.nio.file.AccessDeniedException
      s3Download:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - software.amazon.awssdk.core.exception.SdkClientException
          - software.amazon.awssdk.services.s3.model.S3Exception
        ignoreExceptions:
          - software.amazon.awssdk.services.s3.model.NoSuchKeyException
      s3Delete:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - software.amazon.awssdk.core.exception.SdkClientException
          - software.amazon.awssdk.services.s3.model.S3Exception
        ignoreExceptions:
          - software.amazon.awssdk.services.s3.model.NoSuchKeyException
      rabbitProducer:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.amqp.AmqpException
      databaseRetry:
        maxAttempts: 3
        waitDuration: 100ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.dao.DataAccessException
  # Circuit Breaker configuration for Storage Service
  circuitbreaker:
    instances:
      storageServiceCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 30s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
