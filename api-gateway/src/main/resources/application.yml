spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: authorization-server
              uri: lb://authorization-server
              predicates:
                - Path=/auth/**
            - id: resource-service
              uri: lb://resource-service
              predicates:
                - Path=/resources/**
              filters:
                - name: RequestSize
                  args:
                    maxSize: 100MB
            - id: song-service
              uri: lb://song-service
              predicates:
                - Path=/songs/**

server:
  port: ${SERVER_PORT:8083}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:my-super-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm}
  service-token-expiration-ms: ${JWT_SERVICE_TOKEN_EXPIRATION_MS:86400000}
  service-token-subject: ${JWT_SERVICE_TOKEN_SUBJECT:api-gateway}

# Authorization Server URL for token validation
authorization:
  server:
    url: ${AUTHORIZATION_SERVER_URL:http://localhost:9000}

# Eureka configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    hostname: ${EUREKA_INSTANCE_HOSTNAME:localhost}
    prefer-ip-address: ${EUREKA_INSTANCE_PREFERIPADDRESS:true}
    appname: api-gateway

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    root: INFO
    com.epam.learn: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %highlight(%-5level) - [%X{traceId:-}] - %msg%n"
